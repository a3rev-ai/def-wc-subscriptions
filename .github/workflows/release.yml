name: Auto Release and Deploy to S3

on:
  push:
    branches:
      - main
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from plugin file
        id: get_version
        run: |
          VERSION=$(grep -oP "Version:\s*\K[\d\.]+" digital-employee-addon-wc-subscriptions.php)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get_version.outputs.version }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get_version.outputs.version }} does not exist"
          fi

      - name: Delete existing release if exists
        if: steps.check_tag.outputs.exists == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing GitHub release
          gh release delete "v${{ steps.get_version.outputs.version }}" --yes || true
          echo "✅ Deleted existing release v${{ steps.get_version.outputs.version }}"

      - name: Delete existing tag if exists
        if: steps.check_tag.outputs.exists == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete remote tag
          git push --delete origin "v${{ steps.get_version.outputs.version }}" || true
          
          # Delete local tag
          git tag -d "v${{ steps.get_version.outputs.version }}" || true
          
          echo "✅ Deleted existing tag v${{ steps.get_version.outputs.version }}"

      - name: Create and push tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v${{ steps.get_version.outputs.version }}" -m "Release version ${{ steps.get_version.outputs.version }}"
          git push origin "v${{ steps.get_version.outputs.version }}"
          echo "✅ Created and pushed tag v${{ steps.get_version.outputs.version }}"

      - name: Build plugin zip
        run: |
          PLUGIN_NAME="digital-employee-addon-wc-subscriptions"
          ZIP_NAME="${PLUGIN_NAME}.zip"
          
          # Create a temporary directory for the plugin
          mkdir -p /tmp/${PLUGIN_NAME}
          
          # Copy plugin files excluding development files
          rsync -av --progress . /tmp/${PLUGIN_NAME}/ \
            --exclude='.git*' \
            --exclude='node_modules' \
            --exclude='.bit' \
            --exclude='package-lock.json' \
            --exclude='.DS_Store' \
            --exclude='._*' \
            --exclude='*.log' \
            --exclude='.github'
          
          # Create zip file
          cd /tmp
          zip -r ${ZIP_NAME} ${PLUGIN_NAME}
          mv ${ZIP_NAME} $GITHUB_WORKSPACE/
          
          echo "zip_file=${ZIP_NAME}" >> $GITHUB_OUTPUT
        id: build_zip

      - name: Upload ZIP to Private S3 Bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION_PRIVATE: ${{ secrets.AWS_REGION_PRIVATE }}
          S3_BUCKET_PRIVATE: ${{ secrets.S3_BUCKET_PRIVATE }}
        run: |
          # Install AWS CLI
          pip install awscli
          
          # Upload ZIP to private bucket in folder (no public access)
          aws s3 cp ${{ steps.build_zip.outputs.zip_file }} \
            s3://${S3_BUCKET_PRIVATE}/digital-employee-addon-wc-subscriptions/digital-employee-addon-wc-subscriptions.zip \
            --region ${AWS_REGION_PRIVATE}
          
          echo "✅ Uploaded digital-employee-addon-wc-subscriptions.zip to private S3 bucket"

      - name: Upload Changelog to Public S3 Bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION_PUBLIC: ${{ secrets.AWS_REGION_PUBLIC }}
          S3_BUCKET_PUBLIC: ${{ secrets.S3_BUCKET_PUBLIC }}
        run: |
          # Upload changelog.txt to public bucket with public-read ACL
          aws s3 cp changelog.txt \
            s3://${S3_BUCKET_PUBLIC}/digital-employee-addon-wc-subscriptions/changelog.txt \
            --region ${AWS_REGION_PUBLIC} \
            --acl public-read \
            --content-type "text/plain; charset=utf-8"
          
          echo "✅ Uploaded changelog.txt to public S3 bucket"

      - name: Invalidate CloudFront Cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION_PUBLIC: ${{ secrets.AWS_REGION_PUBLIC }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          # Invalidate CloudFront cache for changelog
          aws cloudfront create-invalidation \
            --distribution-id ${CLOUDFRONT_DISTRIBUTION_ID} \
            --paths "/digital-employee-addon-wc-subscriptions/changelog.txt" \
            --region ${AWS_REGION_PUBLIC}
          
          echo "✅ CloudFront cache invalidated for changelog.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## Digital Employee Add-on: WooCommerce Subscriptions v${{ steps.get_version.outputs.version }}
            
            ### Download
            - Plugin Zip: `digital-employee-addon-wc-subscriptions.zip` (Available via CloudFront: https://${{ secrets.CLOUDFRONT_DOMAIN }}/digital-employee-addon-wc-subscriptions/digital-employee-addon-wc-subscriptions.zip)
            - Changelog: https://${{ secrets.CLOUDFRONT_DOMAIN }}/digital-employee-addon-wc-subscriptions/changelog.txt
            
            ### Requirements
            - Digital Employee Framework - WordPress Bridge
            - WooCommerce
            - WooCommerce Subscriptions
            
            ### Installation
            1. Download the plugin zip file from CloudFront
            2. Upload to WordPress via Plugins > Add New > Upload Plugin
            3. Activate the plugin
            
            ### Deployment Details
            - ✅ Uploaded to private S3 bucket (no public access)
            - ✅ Changelog published to public S3 bucket
            - ✅ CloudFront cache invalidated
            
            Automated release created by GitHub Actions.
          files: |
            ${{ steps.build_zip.outputs.zip_file }}
            changelog.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
