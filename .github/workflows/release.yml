name: Build Plugin Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          # Create clean build directory
          mkdir -p build/def-wc-subscriptions

          # Copy only distributable files
          cp def-wc-subscriptions.php LICENSE readme.txt changelog.txt build/def-wc-subscriptions/
          cp -r includes build/def-wc-subscriptions/

          # Create zip from build directory
          cd build
          zip -r ../def-wc-subscriptions.zip def-wc-subscriptions/

          # Verify structure
          echo "=== Zip contents ==="
          unzip -l ../def-wc-subscriptions.zip
          echo "=== Verifying main plugin file ==="
          unzip -p ../def-wc-subscriptions.zip def-wc-subscriptions/def-wc-subscriptions.php | head -5

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            def-wc-subscriptions.zip \
            --clobber

      - name: Update README download badge
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          sed -i "s|Download_Plugin-v[0-9]*\.[0-9]*\.[0-9]*-blue|Download_Plugin-${VERSION}-blue|g" README.md
          sed -i "s|releases/download/v[0-9]*\.[0-9]*\.[0-9]*/def-wc-subscriptions.zip|releases/download/${VERSION}/def-wc-subscriptions.zip|g" README.md

          if git diff --quiet README.md; then
            echo "README already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Update download badge to ${VERSION} [skip ci]"
            git push origin HEAD:main
          fi
